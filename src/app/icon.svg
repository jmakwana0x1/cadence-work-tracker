<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cadence">
  <defs>
    <!-- Violet tile gradient (brand accent) -->
    <linearGradient id="tile" x1="96" y1="48" x2="416" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9d8cff"/>
      <stop offset="0.5" stop-color="#7c6cf5"/>
      <stop offset="1" stop-color="#5b3fd6"/>
    </linearGradient>
    <!-- Top-left sheen for depth -->
    <radialGradient id="sheen" cx="0.3" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle gradient on the C stroke -->
    <linearGradient id="mark" x1="160" y1="150" x2="352" y2="362" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ece7ff"/>
    </linearGradient>
    <filter id="lift" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#3a1e8a" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Rounded squircle tile -->
  <rect x="40" y="40" width="432" height="432" rx="120" fill="url(#tile)" filter="url(#lift)"/>
  <rect x="40" y="40" width="432" height="432" rx="120" fill="url(#sheen)"/>
  <rect x="41" y="41" width="430" height="430" rx="119" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="2"/>

  <!-- Bold "C" arc, open to the right -->
  <path d="M 331.85 165.61 A 118 118 0 1 0 331.85 346.39"
        fill="none" stroke="url(#mark)" stroke-width="86" stroke-linecap="round"/>
  <!-- Cadence "beat" dot at the opening -->
  <circle cx="354" cy="256" r="30" fill="url(#mark)"/>
</svg>
